# Spark default parameters
spark.authenticate=false
spark.sql.hive.metastore.jars=${env:HADOOP_COMMON_HOME}/../hive/lib/*:${env:HADOOP_COMMON_HOME}/client/*
spark.sql.autoBroadcastJoinThreshold=-1
# Generated parameters
spark.yarn.executor.memoryOverhead=1
spark.sql.shuffle.partitions=1
spark.result.schema=test_schema
spark.result.table=test_table
# Parameters from ctl
spark.user.name=$[user.name]
spark.keytabPath=$[keytabPath]
# Custom parameters from ctl
[ctlCustomConf]
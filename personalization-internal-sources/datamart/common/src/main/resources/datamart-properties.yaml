# Страница с описанием используемые параметров customJavaOpts: https://confluence.ca.sbrf.ru/pages/viewpage.action?pageId=2610727231
#sdp greenplum version 1.0 jdbc build

production:
  jarPath: ${nameNode}/oozie-app/wf/custom/rb/production/utils/common/jars/personalization.jar
  GpPath: ${nameNode}/oozie-app/wf/custom/rb/production/utils/libs/greenplum-connector-apache-spark-scala_2.12-2.1.3.jar
  PgPath: ${nameNode}/oozie-app/wf/custom/rb/production/utils/libs/postgresql-42.0.0.jre6.jar
  logPath: ${nameNode}/oozie-app/wf/custom/rb/production/utils/common/custom-log4j.properties
  keystorePath: ${nameNode}/oozie-app/wf/custom/rb/production/utils/common/keystore/kafka-client_prom.jks
  propertiesShellPath: ${nameNode}/oozie-app/wf/custom/rb/production/utils/common/fill-properties.sh
  propertiesPath: /oozie-app/wf/custom/rb/production/utils/common/datamart-properties.yaml
  JaasPath: ${nameNode}/oozie-app/wf/custom/rb/production/utils/common/validate-ctl-version/jaas_${wf:conf('user.name')}.conf#jaas.conf
  ctlVersionRequired: &prod_ctl 1.1.2
  ctlApiVersionV5: false
  onSchedule: []
production_test:
  jarPath: ${nameNode}/oozie-app/wf/custom/rb/production_test/utils/common/jars/personalization.jar
  logPath: ${nameNode}/oozie-app/wf/custom/rb/production_test/utils/common/custom-log4j.properties
  propertiesShellPath: ${nameNode}/oozie-app/wf/custom/rb/production_test/utils/common/fill-properties.sh
  propertiesPath: /oozie-app/wf/custom/rb/production_test/utils/common/datamart-properties.yaml
  ctlVersionRequired: *prod_ctl
memoryPreset:
  val1: &MINIMAL "MINIMAL" #  2 executors x 2G
  val2: &LOWEST "LOWEST" #  8 executors x 2G
  val3: &LOW "LOW"       # 20 executors x 2G
  val4: &MID "MID"       # 40 executors x 4G
  val5: &HIGH "HIGH"     # 80 executors x 8G

kafkaOpts: &KAFKA
  kafka.server: 10.114.49.115:9093,10.114.48.245:9093,10.114.48.65:9093,10.114.49.236:9093,10.114.49.93:9093,10.113.54.60:9093,10.113.54.168:9093,10.113.54.32:9093,10.113.54.252:9093,10.113.54.183:9093
  kafka.certName: kafka-client_prom.jks
  spark.yarn.dist.files: kafka-client_prom.jks
  spark.sql.jsonGenerator.ignoreNullFields: false

# Этот блок обязательно должен идти после всех параметров CustomJavaOpts
# Тогда все указанные выше параметры будут переопределять дублирующие из SDP
sdpOpts: &SDP
  dqcheck: enabled
  spark.emergencyStop: false
  spark.hdpType: sdp
  spark.sql.legacy.timeParserPolicy: LEGACY
  spark.sql.legacy.typeCoercion.datetimeToString.enabled: true
  spark.sql.legacy.keepCommandOutputSchema: true
  spark.sql.legacy.parquet.int96RebaseModeInRead: LEGACY
  spark.sql.legacy.parquet.int96RebaseModeInWrite: LEGACY
  spark.sql.parquet.writeLegacyFormat: true
  spark.sql.hive.convertMetastoreParquet: false
  spark.sql.hive.convertInsertingPartitionedTable: false
  spark.sql.hive.convertMetastoreCtas: false
  spark.sql.hive.convertMetastoreOrc: false
  spark.sql.warehouse.dir: /apps/spark/warehouse
  spark.hadoop.yarn.timeline-service.enabled: false
  spark.yarn.access.hadoopFileSystems: hdfs://hdfsgw/
  spark.kerberos.access.hadoopFileSystems: hdfs://hdfsgw/
#  spark.hadoop.mapred.input.dir.recursive: true

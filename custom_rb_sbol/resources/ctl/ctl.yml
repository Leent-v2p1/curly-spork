templates:
  entity_hive: &ctlEntityHive    { storage: "HIVE" }
  wf_info: &wfDefaultInfo
    {
      type: principal,
      orchestrator: oozie,
      singleLoading: true,
      profile: "{{global.CTL_PROFILE_NAME}}",
      link_stats: [ 2, 5, 10, 11, 34 ]
    }
  wf_params:
    - &wfDefaultParam__secman_conf_hdfs_path
      param: { name: b2c.sql.secman.conf.hdfs.path, prior_value: "{{mart.secman_conf_hdfs_path}}" }
    - &wfDefaultParam__sber_sql_engine_default
      param: { name: b2c.sql.engine.default, prior_value: "spark" }
    - &wfDefaultParam__kibana_app_id
      param: { name: kibana.app.id, prior_value: "{{mart.kibana_app_id}}" }
    - &wfDefaultParam__ctl_root_category_name
      param: { name: ctl.root.category.name, prior_value: "p1030" }
    - &wfDefaultParam__app_version
      param: { name: app.version, prior_value: "{{devops.version}}" }
    - &wfDefaultParam__app_version_oozie
      param: { name: app_version, prior_value: "{{devops.version}}" }
    - &wfDefaultParam__app_upload_lastUpdateTime
      param: { name: app.upload.lastUpdateTime, prior_value: "{{ now() }}" }
    - &wfDefaultParam__user_name
      param: { name: user.name, prior_value: "{{mart.USER_NAME}}" }
    - &wfDefaultParam__mapreduce_job_queuename
      param: { name: mapreduce.job.queuename, prior_value: "{{mart.YARN_QUEUE}}" }
    - &wfDefaultParam__sber_sql_conf_path
      param: { name: b2c.sql.conf.path, prior_value: "{{mart.hdfs_path_app_full}}/conf/external/external.conf" }
    - &wfDefaultParam__sber_sql_spark_deploy
      param: { name: b2c.sql.engine.spark.deploy, prior_value: "{{sber_sql_spark_deploy}}" }
    - &wfDefaultParam__oozie_wf_application_path
      param: { name: oozie.wf.application.path, prior_value: "hdfs:///oozie-app/b2c/fw/b2c-sql/{{mart.sber_sql_version}}" }
    - &wfDefaultParam__spark_executor_extraJavaOptions
      param: { name: b2c.sql.engine.spark.executor.extraJavaOptions, prior_value: "{{mart.spark_executor_extraJavaOptions}}" }
    - &wfDefaultParam__spark_driver_extraJavaOptions
      param: { name: b2c.sql.engine.spark.driver.extraJavaOptions, prior_value: "{{mart.spark_driver_extraJavaOptions}}" }
    - &wfParam-CI
      param: { name: CI, prior_value: "{{mart.name_official}}" }
    - &wfParam-DEV_TEAM_EMAIL
      param: { name: DEV_TEAM_EMAIL , prior_value: "{{mart.notifications_emails}}" }
    - &wfParam-spark_submit_cmd
      param: { name: b2c.sql.engine.spark.cmd, prior_value: "${spark_submit_cmd_main} ${spark_submit_cmd_high}" }
    - &wfParam-sber_sql_logger_log4j2_xml_path
      param: { name: b2c.sql.logger.log4j2.xml.path, prior_value: "{{devops.datamart_path_app}}/log4j2.xml" }
    - &wfParam-sber_sql_external_function_path
      param: { name: b2c.sql.external.function.path, prior_value: "{{devops.datamart_path_app}}/function" }
    - &wfParam-sber_sql_external_udf_path
      param: { name: b2c.sql.external.udf.path, prior_value: "{{devops.datamart_path_app}}/udf" }
    - &wfParam-sber_sql_log_level
      param: { name: b2c.sql.log.level, prior_value: "info" }
    - &wfMartParam__src_schema_name
      param: { name: src_schema_name, prior_value: "{{mart.src_schema_name}}" }
    - &wfMartParam__parallel_degree
      param: { name: parallel_degree, prior_value: "1" }
    - &wfDefaultParams
      FLATTEN:
        - *wfDefaultParam__secman_conf_hdfs_path
        - *wfDefaultParam__sber_sql_engine_default
        - *wfDefaultParam__kibana_app_id
        - *wfDefaultParam__ctl_root_category_name
        - *wfDefaultParam__app_version
        - *wfDefaultParam__app_version_oozie
        - *wfDefaultParam__app_upload_lastUpdateTime
        - *wfDefaultParam__user_name
        - *wfDefaultParam__mapreduce_job_queuename
        - *wfDefaultParam__sber_sql_conf_path
        - *wfDefaultParam__sber_sql_spark_deploy
        - *wfDefaultParam__oozie_wf_application_path
        - *wfDefaultParam__spark_executor_extraJavaOptions
        - *wfDefaultParam__spark_driver_extraJavaOptions
        - *wfParam-CI
        - *wfParam-DEV_TEAM_EMAIL
        - *wfParam-spark_submit_cmd
        - *wfParam-sber_sql_logger_log4j2_xml_path
        - *wfParam-sber_sql_external_function_path
        - *wfParam-sber_sql_external_udf_path
        - *wfParam-sber_sql_log_level
    - &wfMartParams
      FLATTEN:
        - *wfMartParam__src_schema_name
        - *wfMartParam__parallel_degree
    - &notifications_email
      notifications:
        - { status: "ERROR", emails: [ "{{mart.notifications_emails}}" ] }
        - { status: "SUCCESS", emails: [ "{{mart.notifications_emails}}" ] }
        - { status: "LOCK", emails: [ "{{mart.notifications_emails}}" ] }

